version: '3.8'

services:
  db-test:
    image: postgres:18.3-alpine
    container_name: projects_postgres_test
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: testpass
      POSTGRES_DB: b2b_portal_test
    ports:
      - "5433:5432"
    tmpfs: /var/lib/postgresql/
